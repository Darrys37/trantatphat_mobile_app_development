name: fontend
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Giao diện & Icons
  cupertino_icons: ^1.0.8

  # Gọi API xuống Backend Spring Boot
  http: ^1.2.1

  # Lưu trữ Token (JWT) và thông tin user
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2 # Bảo mật cao hơn cho Refresh Token

  # Giải mã JWT để lấy thông tin user từ token
  jwt_decoder: ^2.0.1

  # Đăng nhập bằng Google & Facebook (Native App)
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.0.0

  # ⭐ THÊM MỚI: Mở URL trên cả Web và Mobile (Fix lỗi dart:js trên Android/iOS)
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Khai báo thư mục chứa ảnh (Logo Google, Facebook, v.v.)
  assets:
    - assets/images/